<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水果分類大挑戰 — 教師控制台</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Microsoft JhengHei','PingFang TC',sans-serif;
  background:#0d0d1a; color:#fff; min-height:100vh;
}

/* ── HEADER ───────────────────────────────────── */
.topbar {
  background:rgba(0,0,0,0.5); border-bottom:1px solid rgba(255,255,255,0.08);
  padding:14px 20px; display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:50;
}
.topbar h1 { font-size:1.1rem; font-weight:900; color:#FFB347; flex:1; }
.status-badge {
  padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:700;
}
.badge-waiting   { background:rgba(52,73,94,0.8);   color:#aaa; }
.badge-announced { background:rgba(39,174,96,0.3);  color:#2ecc71; }
.last-upd { font-size:0.72rem; color:rgba(255,255,255,0.3); white-space:nowrap; }
.btn-gas {
  background:transparent; border:1px solid rgba(255,255,255,0.2);
  border-radius:8px; padding:6px 10px; cursor:pointer;
  display:flex; align-items:center; gap:6px; color:#fff; font-size:0.8rem;
  font-family:inherit;
}
.dot { width:8px; height:8px; border-radius:50%; background:#e74c3c; }
.dot.ok { background:#2ecc71; }

/* ── LAYOUT ───────────────────────────────────── */
.main { padding:16px 20px; max-width:1100px; margin:0 auto; }

/* ── STAT CARDS ───────────────────────────────── */
.stat-row {
  display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px;
}
.stat-card {
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
  border-radius:14px; padding:16px; text-align:center;
}
.stat-card .sv { font-size:2.2rem; font-weight:900; color:#FFB347; }
.stat-card .sl { font-size:0.78rem; color:rgba(255,255,255,0.45); margin-top:4px; }

/* ── ACTION BUTTONS ───────────────────────────── */
.action-row { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
.btn-announce {
  padding:14px 28px;
  background:linear-gradient(135deg,#e67e22,#f39c12);
  border:none; border-radius:12px; color:#fff;
  font-size:1rem; font-weight:900; font-family:inherit; cursor:pointer;
  letter-spacing:1px; transition:opacity .2s;
}
.btn-announce:hover { opacity:.9; }
.btn-announce:disabled { opacity:.4; cursor:default; }
.btn-clear {
  padding:14px 20px;
  background:rgba(231,76,60,0.15); border:1px solid rgba(231,76,60,0.4);
  border-radius:12px; color:#e74c3c;
  font-size:0.9rem; font-weight:700; font-family:inherit; cursor:pointer;
}
.btn-refresh {
  padding:14px 20px;
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
  border-radius:12px; color:#fff;
  font-size:0.9rem; font-family:inherit; cursor:pointer;
}

/* ── TABS ─────────────────────────────────────── */
.tabs { display:flex; gap:4px; margin-bottom:16px; }
.tab-btn {
  padding:10px 18px; border:none; border-radius:10px;
  background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5);
  font-size:0.88rem; font-weight:700; font-family:inherit; cursor:pointer;
}
.tab-btn.active { background:rgba(255,179,71,0.2); color:#FFB347; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* ── RANK TABLE ───────────────────────────────── */
.rank-table { width:100%; border-collapse:collapse; }
.rank-table th {
  padding:10px 14px; text-align:left;
  font-size:0.78rem; color:rgba(255,255,255,0.4);
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.rank-table td {
  padding:12px 14px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:0.9rem;
}
.rank-table tr:last-child td { border-bottom:none; }
.rank-num { font-weight:900; font-size:1rem; }
.score-bar-wrap { display:flex; align-items:center; gap:8px; }
.score-bar { flex:1; height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
.score-bar-fill { height:100%; background:linear-gradient(90deg,#e67e22,#f39c12); border-radius:4px; }

/* ── PER-QUESTION STATS ───────────────────────── */
.qstat-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px;
}
.qstat-card {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  border-radius:12px; overflow:visible; position:relative;
}
/* 圖片 hover 放大 */
.qstat-img-wrap { overflow:hidden; border-radius:10px 10px 0 0; }
.qstat-card img {
  width:100%; aspect-ratio:1; object-fit:cover; display:block;
  transition:transform .25s ease; transform-origin:center center;
  position:relative; z-index:1;
}
.qstat-card:hover img { transform:scale(2.4); z-index:30; border-radius:8px;
  box-shadow:0 10px 40px rgba(0,0,0,0.7); }

.qstat-info { padding:10px; font-size:0.8rem; }
.qstat-ans  { color:rgba(255,255,255,0.5); margin-bottom:6px; }
.qstat-bar-row { display:flex; justify-content:space-between; margin-bottom:3px; }
.qbar { height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; margin-bottom:6px; }
.qbar-fill         { height:100%; background:#2ecc71; border-radius:3px; }
.qbar-fill.wrong   { background:#e74c3c; }
.qstat-rate { font-size:0.85rem; font-weight:700; color:#FFB347; }

/* 人名 tooltip（懸停在「答對」/「答錯」文字上才顯示） */
.who-trigger {
  position:relative; cursor:pointer;
  text-decoration:underline dotted rgba(255,255,255,0.3);
}
.who-trigger:hover { color:#FFB347; }
.who-tooltip {
  position:absolute; bottom:calc(100% + 8px); left:0;
  background:#1a2535; border:1px solid rgba(255,255,255,0.18);
  border-radius:10px; padding:10px 12px;
  min-width:150px; max-width:280px;
  display:flex; flex-wrap:wrap; gap:4px;
  z-index:100; opacity:0; pointer-events:none;
  transition:opacity .15s; white-space:normal;
}
.who-trigger.open .who-tooltip { opacity:1; pointer-events:auto; }
.chip-correct { background:rgba(46,204,113,0.15); border:1px solid rgba(46,204,113,0.35);
                border-radius:6px; padding:2px 7px; font-size:0.72rem; color:#2ecc71; }
.chip-wrong   { background:rgba(231,76,60,0.15);  border:1px solid rgba(231,76,60,0.35);
                border-radius:6px; padding:2px 7px; font-size:0.72rem; color:#e74c3c; }
.chip-none    { color:rgba(255,255,255,0.25); font-size:0.72rem; font-style:italic; }

/* ── EMPTY STATE ──────────────────────────────── */
.empty { text-align:center; padding:48px 0; color:rgba(255,255,255,0.25); font-size:0.9rem; }

/* ── GAS MODAL ────────────────────────────────── */
.modal-bg {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
  align-items:center; justify-content:center; z-index:200;
}
.modal-bg.open { display:flex; }
.modal {
  background:#1e2a3a; border:1px solid rgba(255,255,255,0.15);
  border-radius:18px; padding:28px; width:92%; max-width:400px;
}
.modal h3 { font-size:1rem; margin-bottom:16px; }
.modal input {
  width:100%; padding:12px 14px;
  background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.2);
  border-radius:10px; color:#fff; font-size:0.82rem; font-family:monospace; margin-bottom:14px;
}
.modal-btns { display:flex; gap:10px; }
.modal-btns button {
  flex:1; padding:12px; border:none; border-radius:10px;
  font-size:0.95rem; font-weight:700; font-family:inherit; cursor:pointer;
}
.btn-msave   { background:#e67e22; color:#fff; }
.btn-mcancel { background:rgba(255,255,255,0.1); color:#fff; }
</style>
</head>
<body>

<!-- ── 頂部 ──────────────────────────────────────────────── -->
<div class="topbar">
  <h1>🍊 水果分類 教師控制台</h1>
  <span class="status-badge badge-waiting" id="status-badge">等待中</span>
  <span class="last-upd" id="last-upd">—</span>
  <button class="btn-gas" onclick="openGasModal()">
    <span class="dot" id="gas-dot"></span>GAS 設定
  </button>
</div>

<!-- ── 主內容 ─────────────────────────────────────────────── -->
<div class="main">

  <!-- 統計卡片 -->
  <div class="stat-row">
    <div class="stat-card">
      <div class="sv" id="sv-count">0</div>
      <div class="sl">已提交人數</div>
    </div>
    <div class="stat-card">
      <div class="sv" id="sv-avg">—</div>
      <div class="sl">平均答對題數</div>
    </div>
    <div class="stat-card">
      <div class="sv" id="sv-status">等待中</div>
      <div class="sl">目前狀態</div>
    </div>
  </div>

  <!-- 操作按鈕 -->
  <div class="action-row">
    <button class="btn-announce" id="btn-announce" onclick="doAnnounce()">公告成績</button>
    <button class="btn-refresh"  onclick="fetchNow()">手動重新整理</button>
    <button class="btn-clear"    onclick="doClear()">新一輪（清除資料）</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tab-rank"  onclick="switchTab('rank',  this)">排行榜</button>
    <button class="tab-btn"        id="tab-qstat" onclick="switchTab('qstat', this)">各題統計</button>
  </div>

  <!-- 排行榜 -->
  <div class="tab-panel active" id="panel-rank">
    <table class="rank-table">
      <thead>
        <tr>
          <th>名次</th>
          <th>姓名</th>
          <th>答對題數</th>
          <th>正確率</th>
          <th>總反應時間</th>
          <th>提交時間</th>
        </tr>
      </thead>
      <tbody id="rank-tbody">
        <tr><td colspan="6" class="empty">尚無資料，等待學生提交…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 各題統計 -->
  <div class="tab-panel" id="panel-qstat">
    <div id="qstat-grid" class="qstat-grid">
      <div class="empty" style="grid-column:1/-1">尚無資料</div>
    </div>
  </div>

</div>

<!-- ── GAS 設定 Modal ────────────────────────────────────── -->
<div class="modal-bg" id="gas-modal">
  <div class="modal">
    <h3>GAS 雲端設定</h3>
    <input id="gas-url-inp" type="text" placeholder="貼上 GAS Web App URL">
    <div class="modal-btns">
      <button class="btn-msave"   onclick="saveGasUrl()">儲存並重新連線</button>
      <button class="btn-mcancel" onclick="closeGasModal()">取消</button>
    </div>
  </div>
</div>

<script>
// ── GAS URL ────────────────────────────────────────────────────
const HARDCODED_GAS = 'https://script.google.com/macros/s/AKfycbw9m9Vfr8F3KOozaHTC7u3Zao_lHlYUveyfq8CoH3asJ2erCs7ChWiGhXYu5ztoeZk/exec';
let GAS_URL = localStorage.getItem('fruit_gas_url') || HARDCODED_GAS;

function gasGet(params) {
  return fetch(GAS_URL + '?' + new URLSearchParams(params)).then(r => r.json());
}

function now() {
  return new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 輪詢 ──────────────────────────────────────────────────────
let pollTimer = null;

function startPoll() {
  stopPoll();
  fetchNow();
  pollTimer = setInterval(fetchNow, 3000);
}
function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function fetchNow() {
  if (!GAS_URL) return;
  try {
    const d = await gasGet({ action: 'getResults' });
    // GAS 回傳錯誤（舊版 Code.gs 尚未部署新版時會出現）
    if (d.error) {
      document.getElementById('last-upd').textContent =
        `⚠ GAS 回傳錯誤：${d.error}（請確認已部署新版 Code.gs）`;
      return;
    }
    render(d);
    document.getElementById('last-upd').textContent = `更新：${now()}`;
  } catch(e) {
    document.getElementById('last-upd').textContent = `連線失敗（${now()}）`;
  }
}

// ── 渲染 ──────────────────────────────────────────────────────
function render(d) {
  const results = d.results || [];
  const qStats  = d.qStats  || [];
  const count   = Number(d.count) || 0;
  const status  = d.status  || 'waiting';
  const total   = 20;

  // 狀態卡
  document.getElementById('sv-count').textContent = count;

  const avgCorr = count > 0
    ? (results.reduce((s, r) => s + r.correct, 0) / count).toFixed(1)
    : '—';
  document.getElementById('sv-avg').textContent = avgCorr;

  const statusEl = document.getElementById('sv-status');
  statusEl.textContent = status === 'announced' ? '已公告' : '等待中';

  const badge = document.getElementById('status-badge');
  badge.textContent = status === 'announced' ? '已公告成績' : '等待中';
  badge.className   = 'status-badge ' + (status === 'announced' ? 'badge-announced' : 'badge-waiting');

  // 公告按鈕（已公告後改為「重新公告」，仍可按，讓遲到學生也能收到）
  const btnA = document.getElementById('btn-announce');
  btnA.disabled    = false;
  btnA.textContent = status === 'announced' ? '重新公告' : '公告成績';

  // 排行榜
  const tbody = results.map((r, i) => {
    const rank = i + 1;
    const pct  = Math.round(r.correct / total * 100);
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    return `<tr>
      <td class="rank-num">${medal}</td>
      <td><strong>${esc(r.name)}</strong></td>
      <td><strong>${r.correct}</strong> / ${total}</td>
      <td>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
          <span style="font-size:0.78rem;color:rgba(255,255,255,0.45);white-space:nowrap">${pct}%</span>
        </div>
      </td>
      <td style="color:rgba(255,255,255,0.5)">${(r.totalMs/1000).toFixed(1)} 秒</td>
      <td style="color:rgba(255,255,255,0.35);font-size:0.8rem">${esc(r.time || '')}</td>
    </tr>`;
  }).join('');
  document.getElementById('rank-tbody').innerHTML = tbody ||
    '<tr><td colspan="6" class="empty">尚無資料，等待學生提交…</td></tr>';

  // 各題統計（含人名明細）
  const qGrid = qStats.map(q => {
    const rate     = q.total > 0 ? Math.round(q.correct / q.total * 100) : 0;
    const wrongPct = q.total > 0 ? Math.round(q.wrong   / q.total * 100) : 0;
    const ans      = q.correctAns || '';
    const who      = q.who || {};

    // 兩個選項：正確答案 vs 另一個
    const optA = ans;
    const optB = ans === '橘子' ? '柳丁' : '橘子';

    function chips(names, cls) {
      if (!names || names.length === 0) return `<span class="chip-none">無人作答</span>`;
      return names.map(n => `<span class="${cls}">${esc(n)}</span>`).join('');
    }

    return `<div class="qstat-card">
      <div class="qstat-img-wrap"><img src="${esc(q.src)}" loading="lazy" alt=""></div>
      <div class="qstat-info">
        <div class="qstat-ans">正確答案：${esc(ans)}</div>
        <div class="qstat-bar-row">
          <span class="who-trigger">✓ 答對 ${q.correct}人
            <div class="who-tooltip">${chips(who[optA], 'chip-correct')}</div>
          </span>
          <span>${rate}%</span>
        </div>
        <div class="qbar"><div class="qbar-fill" style="width:${rate}%"></div></div>
        <div class="qstat-bar-row">
          <span class="who-trigger">✗ 答錯 ${q.wrong}人
            <div class="who-tooltip">${chips(who[optB], 'chip-wrong')}</div>
          </span>
          <span>${wrongPct}%</span>
        </div>
        <div class="qbar"><div class="qbar-fill wrong" style="width:${wrongPct}%"></div></div>
        <div class="qstat-rate">答對率 ${rate}%</div>
      </div>
    </div>`;
  }).join('') || '<div class="empty" style="grid-column:1/-1">尚無資料</div>';
  document.getElementById('qstat-grid').innerHTML = qGrid;
}

// ── 公告成績 ──────────────────────────────────────────────────
async function doAnnounce() {
  if (!confirm('確定要公告成績嗎？學生將立刻看到名次和錯誤題目。')) return;
  try {
    await gasGet({ action: 'announce' });
    fetchNow();
  } catch(e) { alert('公告失敗，請再試'); }
}

// ── 新一輪 ────────────────────────────────────────────────────
async function doClear() {
  if (!confirm('確定要清除所有資料並開始新一輪嗎？')) return;
  try {
    await gasGet({ action: 'clear' });
    fetchNow();
  } catch(e) { alert('清除失敗，請再試'); }
}

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ── GAS 設定 ──────────────────────────────────────────────────
function openGasModal() {
  document.getElementById('gas-url-inp').value = GAS_URL;
  document.getElementById('gas-modal').classList.add('open');
}
function closeGasModal() {
  document.getElementById('gas-modal').classList.remove('open');
}
function saveGasUrl() {
  const v = document.getElementById('gas-url-inp').value.trim();
  GAS_URL = v || HARDCODED_GAS;
  localStorage.setItem('fruit_gas_url', GAS_URL);
  closeGasModal();
  document.getElementById('gas-dot').className = 'dot ok';
  startPoll();
}
document.getElementById('gas-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('gas-modal')) closeGasModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGasModal(); });

// ── 人名 tooltip 點擊開關 ─────────────────────────────────────
// 點「答對」/「答錯」文字 → 開啟；點其他地方 → 關閉
document.addEventListener('click', e => {
  const trigger = e.target.closest('.who-trigger');
  // 關閉所有已開啟的 tooltip
  document.querySelectorAll('.who-trigger.open').forEach(el => {
    if (el !== trigger) el.classList.remove('open');
  });
  // 切換被點到的
  if (trigger) {
    trigger.classList.toggle('open');
    e.stopPropagation();
  }
});

// ── 初始化 ────────────────────────────────────────────────────
document.getElementById('gas-dot').className = 'dot' + (GAS_URL ? ' ok' : '');
if (GAS_URL) startPoll();
</script>
</body>
</html>
