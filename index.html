<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>水果分類大挑戰</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft JhengHei','PingFang TC','Apple LiGothic Medium',sans-serif;
  background: #1a1a2e; color: #fff;
  height: 100dvh; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
.screen { display:none; flex-direction:column; width:100%; height:100dvh; }
.screen.active { display:flex; }

/* ── LOGIN ───────────────────────────────────── */
#login {
  align-items:center; justify-content:center;
  background: linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
}
.login-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius:22px; padding:36px 32px 28px;
  max-width:340px; width:92%; backdrop-filter:blur(12px);
}
.logo { text-align:center; margin-bottom:28px; }
.logo-emoji { font-size:3rem; line-height:1; }
.logo h1 { font-size:1.5rem; font-weight:900; color:#FFB347; letter-spacing:3px; margin-top:8px; }
.logo p  { font-size:0.78rem; color:rgba(255,255,255,0.4); margin-top:4px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:0.82rem; color:rgba(255,255,255,0.55); margin-bottom:6px; }
.field input {
  width:100%; padding:14px 16px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.14);
  border-radius:12px; color:#fff;
  font-size:1.1rem; font-family:inherit;
}
.field input:focus { outline:none; border-color:#FFB347; }
.field input::placeholder { color:rgba(255,255,255,0.22); }
.btn-join {
  width:100%; padding:15px;
  background:linear-gradient(135deg,#e67e22,#f39c12);
  border:none; border-radius:13px;
  color:#fff; font-size:1.15rem; font-weight:900;
  font-family:inherit; letter-spacing:3px; cursor:pointer;
  transition:transform .12s, opacity .2s;
}
.btn-join:active { transform:scale(.97); }
.btn-join:disabled { opacity:.5; cursor:default; }
.err { min-height:22px; margin-top:10px; font-size:0.88rem; color:#ff7675; text-align:center; }

/* ── GAME ────────────────────────────────────── */
#game {
  flex-direction:column; align-items:center; justify-content:space-between;
  background:#1a1a2e; padding:0;
}
.game-header {
  width:100%; padding:16px 20px 10px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(0,0,0,0.3);
}
.g-progress { font-size:0.9rem; color:rgba(255,255,255,0.55); }
.g-name     { font-size:0.9rem; color:rgba(255,255,255,0.55); }

/* 倒數圓圈 */
.cd-wrap {
  position:relative; width:80px; height:80px; margin:12px auto 0;
  flex-shrink:0;
}
.cd-svg { width:80px; height:80px; transform:rotate(-90deg); }
.cd-bg  { fill:none; stroke:rgba(255,255,255,0.1); stroke-width:6; }
.cd-arc { fill:none; stroke:#FFB347; stroke-width:6; stroke-linecap:round;
          stroke-dasharray:220; stroke-dashoffset:0;
          transition:stroke .3s; }
.cd-arc.urgent { stroke:#e74c3c; }
.cd-num {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; font-weight:900;
}

/* 圖片區 */
.img-wrap {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:10px 16px; width:100%; min-height:0;
}
.q-img {
  max-width:100%; max-height:100%;
  object-fit:contain; border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  transition:opacity .2s;
}
.img-loading { opacity:.3; }

/* 答題按鈕 */
.ans-btns {
  width:100%; display:grid; grid-template-columns:1fr 1fr;
  gap:12px; padding:12px 16px 20px;
  flex-shrink:0;
}
.ans-btn {
  padding:20px 0; border:none; border-radius:16px;
  font-size:1.3rem; font-weight:900; font-family:inherit;
  letter-spacing:2px; cursor:pointer;
  transition:transform .1s, opacity .2s;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.ans-btn:active { transform:scale(.96); }
.ans-btn:disabled { opacity:.45; cursor:default; }
.ans-btn .btn-emoji { font-size:1.8rem; }
.btn-tangerine { background:linear-gradient(135deg,#e67e22,#f39c12); color:#fff; }
.btn-orange    { background:linear-gradient(135deg,#27ae60,#2ecc71); color:#fff; }

/* 答案選中高亮 */
.ans-btn.selected   { box-shadow:0 0 0 4px #fff, 0 4px 20px rgba(255,255,255,0.3); }
.ans-btn.not-selected { opacity:.3; }

/* ── WAITING ─────────────────────────────────── */
#waiting {
  align-items:center; justify-content:center;
  background:linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  text-align:center; gap:24px; padding:32px;
}
.wait-emoji { font-size:4rem; }
.wait-title { font-size:1.6rem; font-weight:900; color:#FFB347; }
.wait-sub   { font-size:1rem; color:rgba(255,255,255,0.5); line-height:1.6; }
.wait-score { font-size:1.2rem; color:#fff; }
.wait-score strong { color:#FFB347; font-size:1.8rem; }
.spinner {
  width:44px; height:44px;
  border:4px solid rgba(255,255,255,0.1);
  border-top-color:#FFB347;
  border-radius:50%; animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.wait-count { font-size:0.85rem; color:rgba(255,255,255,0.35); }

/* ── RESULT ──────────────────────────────────── */
#result {
  flex-direction:column;
  background:#0d0d1a; overflow:hidden;
}
.result-header {
  background:linear-gradient(135deg,#e67e22,#f39c12);
  padding:24px 20px 20px; text-align:center; flex-shrink:0;
}
.result-header h2 { font-size:1.3rem; font-weight:900; letter-spacing:2px; }
.result-my-score {
  display:flex; align-items:baseline; justify-content:center;
  gap:6px; margin-top:6px;
}
.result-big   { font-size:3rem; font-weight:900; line-height:1; }
.result-total { font-size:1.1rem; color:rgba(255,255,255,0.7); }
.result-rank  { font-size:1rem; margin-top:8px; color:rgba(255,255,255,0.85); }
.result-ms    { font-size:0.82rem; color:rgba(255,255,255,0.6); margin-top:2px; }

.result-body { flex:1; overflow-y:auto; padding:16px; }

/* 排行榜 */
.rank-title { font-size:0.85rem; font-weight:700; color:rgba(255,255,255,0.4);
              text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.rank-row {
  display:flex; align-items:center; gap:12px;
  padding:10px 14px; border-radius:12px;
  margin-bottom:6px; background:rgba(255,255,255,0.04);
}
.rank-row.is-me   { background:rgba(255,179,71,0.15); border:1px solid rgba(255,179,71,0.4); }
.rank-row.gold    { background:rgba(255,215,0,0.1); }
.rank-row.silver  { background:rgba(192,192,192,0.08); }
.rank-row.bronze  { background:rgba(205,127,50,0.08); }
.rk-num   { font-size:1.2rem; font-weight:900; min-width:32px; text-align:center; }
.rk-info  { flex:1; }
.rk-name  { font-size:0.95rem; font-weight:700; }
.rk-score { font-size:1rem; font-weight:900; text-align:right; }
.rk-ms    { font-size:0.75rem; color:rgba(255,255,255,0.4); text-align:right; }

/* 錯誤題目 */
.wrong-section { margin-top:20px; }
.wrong-title { font-size:0.85rem; font-weight:700; color:#e74c3c;
               text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.wrong-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; }
.wrong-card {
  background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.3);
  border-radius:12px; overflow:hidden; text-align:center;
}
.wrong-card img { width:100%; aspect-ratio:1; object-fit:cover; }
.wrong-card-info { padding:8px; font-size:0.8rem; }
.wrong-card-info .wrong-label { color:#e74c3c; font-weight:700; }
.wrong-card-info .correct-label { color:#2ecc71; }

/* ── GAS 設定 ────────────────────────────────── */
.gas-btn {
  position:fixed; bottom:14px; left:14px; z-index:100;
  background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.15);
  border-radius:20px; padding:6px 12px 6px 8px;
  color:rgba(255,255,255,0.5); font-size:0.78rem; cursor:pointer;
  display:flex; align-items:center; gap:6px;
  font-family:inherit;
}
.dot { width:8px; height:8px; border-radius:50%; background:#e74c3c; flex-shrink:0; }
.dot.ok { background:#2ecc71; }
.modal-bg {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
  align-items:center; justify-content:center; z-index:200;
}
.modal-bg.open { display:flex; }
.modal {
  background:#1e2a3a; border:1px solid rgba(255,255,255,0.15);
  border-radius:18px; padding:28px; width:92%; max-width:380px;
}
.modal h3 { font-size:1rem; margin-bottom:16px; }
.modal input {
  width:100%; padding:12px 14px;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.2);
  border-radius:10px; color:#fff;
  font-size:0.85rem; font-family:monospace; margin-bottom:14px;
}
.modal-btns { display:flex; gap:10px; }
.modal-btns button {
  flex:1; padding:12px; border:none; border-radius:10px;
  font-size:0.95rem; font-weight:700; font-family:inherit; cursor:pointer;
}
.btn-save   { background:#e67e22; color:#fff; }
.btn-cancel { background:rgba(255,255,255,0.1); color:#fff; }
</style>
</head>
<body>

<!-- ── 登入 ───────────────────────────────────────────── -->
<div id="login" class="screen active">
  <div class="login-card">
    <div class="logo">
      <div class="logo-emoji">🍊</div>
      <h1>水果分類大挑戰</h1>
      <p>橘子 vs 柳丁</p>
    </div>
    <div class="field">
      <label>你的姓名</label>
      <input id="inp-name" type="text" placeholder="請輸入姓名" autocomplete="off" autocorrect="off">
    </div>
    <button class="btn-join" id="btn-join" onclick="doJoin()">開始作答</button>
    <div class="err" id="join-err"></div>
  </div>
</div>

<!-- ── 作答 ───────────────────────────────────────────── -->
<div id="game" class="screen">
  <div class="game-header">
    <span class="g-progress" id="g-progress">第 1 題 / 20</span>
    <span class="g-name" id="g-name"></span>
  </div>

  <div class="cd-wrap">
    <svg class="cd-svg" viewBox="0 0 80 80">
      <circle class="cd-bg" cx="40" cy="40" r="35"/>
      <circle class="cd-arc" id="cd-arc" cx="40" cy="40" r="35"/>
    </svg>
    <div class="cd-num" id="cd-num">5</div>
  </div>

  <div class="img-wrap">
    <img class="q-img img-loading" id="q-img" src="" alt="水果圖片">
  </div>

  <div class="ans-btns">
    <button class="ans-btn btn-tangerine" id="btn-t" onclick="submitAnswer('橘子')">
      <span class="btn-emoji">🍊</span>橘子
    </button>
    <button class="ans-btn btn-orange" id="btn-o" onclick="submitAnswer('柳丁')">
      <span class="btn-emoji">🟡</span>柳丁
    </button>
  </div>
</div>

<!-- ── 等待公告 ────────────────────────────────────────── -->
<div id="waiting" class="screen">
  <div class="wait-emoji">⏳</div>
  <div class="wait-title">等待老師公告成績</div>
  <div class="wait-score">你答對了 <strong id="wait-correct">—</strong> / 20 題</div>
  <div class="wait-sub">老師公告後，你就能看到<br>自己的名次和錯誤題目</div>
  <div class="spinner"></div>
  <div class="wait-count" id="wait-count"></div>
</div>

<!-- ── 結果 ───────────────────────────────────────────── -->
<div id="result" class="screen">
  <div class="result-header">
    <h2 id="result-name">你的成績</h2>
    <div class="result-my-score">
      <span class="result-big" id="result-correct">—</span>
      <span class="result-total">/ 20</span>
    </div>
    <div class="result-rank" id="result-rank"></div>
    <div class="result-ms"  id="result-ms"></div>
  </div>
  <div class="result-body">
    <div class="rank-title">排行榜</div>
    <div id="rank-list"></div>
    <div class="wrong-section" id="wrong-section" style="display:none">
      <div class="wrong-title">答錯的題目</div>
      <div class="wrong-grid" id="wrong-grid"></div>
    </div>
  </div>
</div>

<!-- ── GAS 設定 ────────────────────────────────────────── -->
<button class="gas-btn" onclick="openGasModal()">
  <span class="dot" id="gas-dot"></span>GAS 設定
</button>
<div class="modal-bg" id="gas-modal">
  <div class="modal">
    <h3>GAS 雲端設定</h3>
    <input id="gas-url-inp" type="text" placeholder="貼上 GAS Web App URL">
    <div class="modal-btns">
      <button class="btn-save"   onclick="saveGasUrl()">儲存</button>
      <button class="btn-cancel" onclick="closeGasModal()">取消</button>
    </div>
  </div>
</div>

<script>
// ── GAS URL ────────────────────────────────────────────────────
const HARDCODED_GAS = 'https://script.google.com/macros/s/AKfycbw9m9Vfr8F3KOozaHTC7u3Zao_lHlYUveyfq8CoH3asJ2erCs7ChWiGhXYu5ztoeZk/exec';
let GAS_URL = localStorage.getItem('fruit_gas_url') || HARDCODED_GAS;

function gasGet(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params);
  return fetch(url).then(r => r.json());
}

// ── 圖片定義（src + 正確答案）────────────────────────────────
const ALL_IMAGES = [
  {src:'images/橘子_01.png', answer:'橘子'},
  {src:'images/橘子_02.jpg', answer:'橘子'},
  {src:'images/橘子_03.jpg', answer:'橘子'},
  {src:'images/橘子_04.jpg', answer:'橘子'},
  {src:'images/橘子_05.jpg', answer:'橘子'},
  {src:'images/橘子_06.jpg', answer:'橘子'},
  {src:'images/橘子_07.jpg', answer:'橘子'},
  {src:'images/橘子_08.jpg', answer:'橘子'},
  {src:'images/橘子_09.jpg', answer:'橘子'},
  {src:'images/橘子_10.jpg', answer:'橘子'},
  {src:'images/柳丁_01.jpg', answer:'柳丁'},
  {src:'images/柳丁_02.jpg', answer:'柳丁'},
  {src:'images/柳丁_03.png', answer:'柳丁'},
  {src:'images/柳丁_04.jpg', answer:'柳丁'},
  {src:'images/柳丁_05.jpg', answer:'柳丁'},
  {src:'images/柳丁_06.png', answer:'柳丁'},
  {src:'images/柳丁_07.jpg', answer:'柳丁'},
  {src:'images/柳丁_08.jpg', answer:'柳丁'},
  {src:'images/柳丁_09.jpg', answer:'柳丁'},
  {src:'images/柳丁_10.jpg', answer:'柳丁'},
];

const Q_TIME = 5; // 每題秒數

// ── 遊戲狀態 ─────────────────────────────────────────────────
let playerKey  = '';
let myName     = '';
let questions  = [];   // shuffled ALL_IMAGES
let qIdx       = 0;
let myAnswers  = [];   // [{src, ans, isCorrect, correctAns, ms}]
let qStart     = 0;
let cntTimer   = null;
let pollTimer  = null;
let answered   = false;

function shuffle(arr) { return arr.slice().sort(() => Math.random() - 0.5); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── 登入 ─────────────────────────────────────────────────────
function doJoin() {
  const name  = document.getElementById('inp-name').value.trim();
  const errEl = document.getElementById('join-err');
  if (!name) { errEl.textContent = '請填寫姓名'; return; }
  errEl.textContent = '';

  let token = sessionStorage.getItem('fruit_token');
  if (!token) {
    token = Math.random().toString(36).slice(2, 6);
    sessionStorage.setItem('fruit_token', token);
  }
  playerKey = name + '_' + token;
  myName    = name;

  document.getElementById('g-name').textContent = name;
  questions = shuffle(ALL_IMAGES);
  qIdx      = 0;
  myAnswers = [];

  preloadAll();
  showScreen('game');
  showQuestion();
}

// ── 預載圖片 ─────────────────────────────────────────────────
const _cache = {};
function preloadAll() {
  questions.forEach(q => {
    if (!_cache[q.src]) {
      const img = new Image(); img.src = q.src; _cache[q.src] = img;
    }
  });
}

// ── 顯示題目 ─────────────────────────────────────────────────
function showQuestion() {
  if (qIdx >= questions.length) { finishGame(); return; }

  const q    = questions[qIdx];
  answered   = false;
  qStart     = Date.now();

  document.getElementById('g-progress').textContent = `第 ${qIdx+1} 題 / ${questions.length}`;

  const btnT = document.getElementById('btn-t');
  const btnO = document.getElementById('btn-o');
  btnT.disabled = false; btnO.disabled = false;
  btnT.className = 'ans-btn btn-tangerine';
  btnO.className = 'ans-btn btn-orange';

  const imgEl = document.getElementById('q-img');
  imgEl.classList.add('img-loading');
  imgEl.onload = imgEl.onerror = () => {
    imgEl.classList.remove('img-loading');
    startCD(Q_TIME);
  };

  const cached = _cache[q.src];
  if (cached && cached.complete && cached.naturalWidth > 0) {
    imgEl.src = cached.src;
    imgEl.classList.remove('img-loading');
    startCD(Q_TIME);
  } else {
    imgEl.src = q.src;
    if (imgEl.complete && imgEl.naturalWidth > 0) {
      imgEl.classList.remove('img-loading');
      startCD(Q_TIME);
    }
  }
}

// ── 倒數 ─────────────────────────────────────────────────────
const ARC_LEN = 220; // stroke-dasharray

function startCD(secs) {
  stopCD();
  let rem = secs;
  updateCD(rem, secs);
  cntTimer = setInterval(() => {
    rem--;
    updateCD(rem, secs);
    if (rem <= 0) { stopCD(); timeUp(); }
  }, 1000);
}

function stopCD() {
  if (cntTimer) { clearInterval(cntTimer); cntTimer = null; }
}

function updateCD(rem, total) {
  const pct    = rem / total;
  const offset = ARC_LEN * (1 - pct);
  const arc    = document.getElementById('cd-arc');
  arc.style.strokeDashoffset = offset;
  arc.className = 'cd-arc' + (rem <= 2 ? ' urgent' : '');
  document.getElementById('cd-num').textContent = Math.max(0, rem);
}

function timeUp() {
  if (answered) return;
  // 時間到，記錄未作答
  recordAnswer(null);
}

// ── 作答 ─────────────────────────────────────────────────────
function submitAnswer(ans) {
  if (answered) return;
  stopCD();
  // 視覺回饋
  const selId = ans === '橘子' ? 'btn-t' : 'btn-o';
  const othId = ans === '橘子' ? 'btn-o' : 'btn-t';
  document.getElementById(selId).className = (ans === '橘子' ? 'ans-btn btn-tangerine' : 'ans-btn btn-orange') + ' selected';
  document.getElementById(othId).className = (ans === '橘子' ? 'ans-btn btn-orange' : 'ans-btn btn-tangerine') + ' not-selected';

  recordAnswer(ans);
}

function recordAnswer(ans) {
  if (answered) return;
  answered = true;
  document.getElementById('btn-t').disabled = true;
  document.getElementById('btn-o').disabled = true;

  const q         = questions[qIdx];
  const ms        = ans ? Math.max(0, Date.now() - qStart) : Q_TIME * 1000;
  const isCorrect = ans !== null && ans === q.answer;

  myAnswers.push({ src: q.src, ans: ans || '', isCorrect, correctAns: q.answer, ms });
  qIdx++;

  // 短暫停頓後進下一題
  setTimeout(showQuestion, 400);
}

// ── 完成 20 題 ────────────────────────────────────────────────
async function finishGame() {
  const correct  = myAnswers.filter(a => a.isCorrect).length;
  const totalMs  = myAnswers.reduce((s, a) => s + a.ms, 0);

  document.getElementById('wait-correct').textContent = correct;
  showScreen('waiting');

  // 送出成績
  try {
    await gasGet({
      action:   'submit',
      playerKey,
      name:     myName,
      correct,
      totalMs,
      answers:  JSON.stringify(myAnswers),
    });
  } catch(e) { /* 失敗繼續等 */ }

  // 開始輪詢公告
  startPoll();
}

// ── 輪詢公告 ─────────────────────────────────────────────────
function startPoll() {
  stopPoll();
  doPoll();
  pollTimer = setInterval(doPoll, 3000);
}
function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function doPoll() {
  try {
    const d = await gasGet({ action: 'getStatus' });
    document.getElementById('wait-count').textContent =
      d.count ? `目前 ${d.count} 位同學已提交` : '';
    if (d.status === 'announced') {
      stopPoll();
      showResult(d);
    }
  } catch(e) {}
}

// ── 公告後取結果 ──────────────────────────────────────────────
async function showResult(statusData) {
  try {
    const d = await gasGet({ action: 'getResults' });
    renderResult(d);
  } catch(e) {
    // 若 getResults 失敗，只顯示自己的資料
    renderResult({ results: [], qStats: [] });
  }
}

function renderResult(d) {
  const results  = d.results  || [];
  const correct  = myAnswers.filter(a => a.isCorrect).length;
  const totalMs  = myAnswers.reduce((s, a) => s + a.ms, 0);
  const myRank   = results.findIndex(r => r.name === myName) + 1;
  const total    = questions.length;

  document.getElementById('result-name').textContent    = myName + ' 的成績';
  document.getElementById('result-correct').textContent = correct;
  document.getElementById('result-rank').textContent    =
    myRank > 0 ? `第 ${myRank} 名 / 共 ${results.length} 人` : '';
  document.getElementById('result-ms').textContent      =
    `總反應時間 ${(totalMs/1000).toFixed(1)} 秒`;

  // 排行榜
  document.getElementById('rank-list').innerHTML = results.map((r, i) => {
    const rank    = i + 1;
    const isMe    = r.name === myName;
    const rowCls  = isMe ? 'rank-row is-me' : rank === 1 ? 'rank-row gold' : rank === 2 ? 'rank-row silver' : rank === 3 ? 'rank-row bronze' : 'rank-row';
    const medal   = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    return `<div class="${rowCls}">
      <span class="rk-num">${medal}</span>
      <div class="rk-info"><div class="rk-name">${esc(r.name)}${isMe?' ◀ 我':''}</div></div>
      <div>
        <div class="rk-score">${r.correct} 題</div>
        <div class="rk-ms">${(r.totalMs/1000).toFixed(1)}s</div>
      </div>
    </div>`;
  }).join('');

  // 我答錯的題目
  const wrong = myAnswers.filter(a => !a.isCorrect);
  if (wrong.length > 0) {
    document.getElementById('wrong-section').style.display = '';
    document.getElementById('wrong-grid').innerHTML = wrong.map(a => `
      <div class="wrong-card">
        <img src="${esc(a.src)}" alt="題目">
        <div class="wrong-card-info">
          <div class="wrong-label">你答：${a.ans || '未作答'}</div>
          <div class="correct-label">正確：${esc(a.correctAns)}</div>
        </div>
      </div>`).join('');
  }

  showScreen('result');
}

// ── GAS 設定 UI ───────────────────────────────────────────────
function openGasModal() {
  document.getElementById('gas-url-inp').value = GAS_URL;
  document.getElementById('gas-modal').classList.add('open');
}
function closeGasModal() {
  document.getElementById('gas-modal').classList.remove('open');
}
function saveGasUrl() {
  const v = document.getElementById('gas-url-inp').value.trim();
  GAS_URL = v || HARDCODED_GAS;
  localStorage.setItem('fruit_gas_url', GAS_URL);
  closeGasModal();
  document.getElementById('gas-dot').className = 'dot ok';
}
document.getElementById('gas-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('gas-modal')) closeGasModal();
});

// 初始化 dot
document.getElementById('gas-dot').className = 'dot' + (GAS_URL ? ' ok' : '');

// Enter 送出
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login').classList.contains('active')) doJoin();
});
</script>
